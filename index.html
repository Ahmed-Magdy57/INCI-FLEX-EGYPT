<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCI-FLEXEGYPT - نظام إدارة التصاميم</title>
    <!-- إضافة مكتبات للتصدير -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --header-bg: rgba(255, 255, 255, 0.95);
            --footer-bg: rgba(255, 255, 255, 0.9);
            --text-primary: #333;
            --text-secondary: #666;
            --card-bg: white;
            --border-color: #e0e0e0;
            --hover-bg: #f8f9ff;
            --shadow-color: rgba(0,0,0,0.1);
            --input-bg: white;
            --stat-card-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --modal-bg: white;
            --notes-bg: #fff9e6;
            --footer-text: #333;
        }

        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --header-bg: rgba(26, 26, 46, 0.95);
            --footer-bg: rgba(26, 26, 46, 0.9);
            --text-primary: #fff;
            --text-secondary: #ccc;
            --card-bg: #1e1e2f;
            --border-color: #333;
            --hover-bg: #2a2a3a;
            --shadow-color: rgba(0,0,0,0.3);
            --input-bg: #2a2a3a;
            --stat-card-bg: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            --modal-bg: #1e1e2f;
            --notes-bg: #2a2a3a;
            --footer-text: #fff;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        header {
            background: var(--header-bg);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px var(--shadow-color);
            animation: slideDown 0.8s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        header::before {
            content: 'ﷺ';
            position: absolute;
            top: -20px;
            left: -20px;
            font-size: 150px;
            opacity: 0.03;
            transform: rotate(15deg);
            color: #667eea;
            font-family: 'Traditional Arabic', 'Segoe UI', Tahoma, sans-serif;
        }

        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logo-section:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8em;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            animation: logoPulse 2s infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text h2 {
            font-size: 1.8em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            line-height: 1.2;
        }

        .logo-text p {
            color: var(--text-secondary);
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 2px solid #667eea;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .theme-toggle:hover {
            transform: rotate(45deg) scale(1.1);
            background: #667eea;
            color: white;
        }

        .salawat-section {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .salawat-container {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .salawat-container:hover {
            transform: scale(1.05);
        }

        .salawat-text {
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .kaaba-icon {
            font-size: 1.5em;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        .salawat-counter {
            background: white;
            color: #667eea;
            padding: 5px 15px;
            border-radius: 30px;
            margin-right: 10px;
            font-size: 1.1em;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .reset-button {
            background: white;
            color: #667eea;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .reset-button:hover {
            transform: rotate(180deg) scale(1.1);
            background: #f0f0f0;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .stat-card {
            background: var(--stat-card-bg);
            color: white;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            animation: pulse 2s infinite;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            100% { transform: translateX(100%); }
        }

        .stat-card .stat-number {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .export-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .export-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 2px solid #667eea;
        }

        .export-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--shadow-color);
            background: #667eea;
            color: white;
        }

        .export-btn.excel:hover {
            background: #1D6F42;
            border-color: #1D6F42;
        }

        .export-btn.pdf:hover {
            background: #F40F02;
            border-color: #F40F02;
        }

        .backup-btn {
            background: #4CAF50;
            color: white;
            border: none;
        }

        .restore-btn {
            background: #FF9800;
            color: white;
            border: none;
        }

        /* زر فتح القفل */
        .unlock-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid transparent;
        }

        .unlock-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 75, 75, 0.4);
            border-color: white;
        }

        .unlock-btn.locked {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        /* نافذة كلمة المرور */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .password-container {
            background: var(--modal-bg);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: modalSlideIn 0.4s ease;
            border: 2px solid #667eea;
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.5);
        }

        .password-container h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .password-container input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            font-size: 1.1em;
            background: var(--input-bg);
            color: var(--text-primary);
            text-align: center;
        }

        .password-container input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-buttons {
            display: flex;
            gap: 10px;
        }

        .password-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .password-btn.submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .password-btn.cancel {
            background: #ff4444;
            color: white;
        }

        .password-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .lock-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: lockShake 3s infinite;
        }

        @keyframes lockShake {
            0%, 100% { transform: scale(1); }
            5%, 15% { transform: scale(1.1) rotate(5deg); }
            10%, 20% { transform: scale(1.1) rotate(-5deg); }
        }

        .input-section, .filter-section, .export-toolbar, .edit-btn, .delete-btn, .btn-submit, .backup-btn, .restore-btn, .status-badge[onclick] {
            transition: all 0.3s ease;
        }

        .input-section.disabled, .filter-section.disabled, .export-toolbar.disabled {
            opacity: 0.7;
            pointer-events: none;
            user-select: none;
            position: relative;
        }

        .input-section.disabled::after, .filter-section.disabled::after, .export-toolbar.disabled::after {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5em;
            opacity: 0.3;
            z-index: 10;
            pointer-events: none;
        }

        .edit-btn.disabled, .delete-btn.disabled, .btn-submit.disabled, .status-badge.disabled {
            opacity: 0.5;
            pointer-events: none;
            cursor: not-allowed;
        }

        .locked-badge {
            background: #ff4444;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-right: 10px;
        }

        .input-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px var(--shadow-color);
            animation: slideUp 0.6s ease;
            position: relative;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .input-title {
            font-size: 1.5em;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 5px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .radio-option label {
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
        }

        .surface-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .surface-badge.sathi {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }

        .surface-badge.aksi {
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            color: white;
        }

        .designer-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
        }

        .notes-field {
            background-color: var(--notes-bg);
            border-color: #ffd700;
        }

        .default-notes-hint {
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .default-notes-hint span {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .btn-submit, .btn-edit-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover, .btn-edit-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .filter-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px var(--shadow-color);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
        }

        .filter-input {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: var(--input-bg);
            color: var(--text-primary);
            min-width: 250px;
        }

        .filter-select {
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1em;
            background: var(--input-bg);
            color: var(--text-primary);
            min-width: 150px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            animation: fadeInUp 0.8s ease;
            margin-bottom: 30px;
        }

        @keyframes fadeInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px var(--shadow-color);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            animation: cardAppear 0.6s ease forwards;
            opacity: 0;
            transform: translateY(30px);
            border: 1px solid var(--border-color);
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px var(--shadow-color);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }

        .card-header h3 {
            font-size: 1.3em;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .order-id {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
            position: relative;
            z-index: 1;
        }

        .card-body {
            padding: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .info-row:hover {
            background: var(--hover-bg);
            padding: 10px 15px;
            margin: 0 -15px;
            border-radius: 8px;
        }

        .info-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: bold;
        }

        .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            display: inline-block;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(102, 126, 234, 0.5); }
            50% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.8); }
            100% { box-shadow: 0 0 5px rgba(102, 126, 234, 0.5); }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.95em;
        }

        .status-badge:not(.disabled) {
            cursor: pointer;
        }

        .status-done {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            box-shadow: 0 3px 10px rgba(76, 175, 80, 0.3);
        }

        .status-pending {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            box-shadow: 0 3px 10px rgba(255, 152, 0, 0.3);
        }

        .status-badge:not(.disabled):hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .edit-btn, .delete-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .edit-btn:not(.disabled) {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            cursor: pointer;
        }

        .edit-btn:not(.disabled):hover {
            background: linear-gradient(135deg, #45a049, #3d8b40);
            transform: scale(1.05);
        }

        .delete-btn:not(.disabled) {

            color: white;

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .modal-content {
            background: var(--modal-bg);
            width: 50%;
            height: 80%;
            margin: 5% auto;
            border-radius: 25px;
            overflow: hidden;
            animation: modalSlideIn 0.4s ease;
            box-shadow: 0 25px 50px var(--shadow-color);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        @keyframes modalSlideIn {
            from { transform: translateY(-100px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 25px;
            position: relative;
            flex-shrink: 0;
        }

        .modal-header h2 {
            font-size: 1.5em;
            margin: 0;
            padding-left: 30px;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 28px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: #667eea var(--border-color);
        }

        .modal-body::-webkit-scrollbar {
            width: 8px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: var(--border-color);
            border-radius: 10px;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        .details-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;

            border: 1px solid var(--border-color);

            border: 1px solid var(--border-color);

            flex-direction: column;
            gap: 15px;
        }

        .edit-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .edit-field label {
            color: #667eea;
            font-weight: 600;
            font-size: 1em;
        }

        .edit-field input, .edit-field select, .edit-field textarea {

            border-radius: 10px;
            font-size: 1em;
            background: var(--input-bg);
            color: var(--text-primary);

            min-height: 100px;
            resize: vertical;
        }

        .no-results {

            padding: 50px;
            background: var(--card-bg);
            border-radius: 15px;
            color: var(--text-secondary);
            font-size: 1.2em;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;

        .footer {

            margin-top: 30px;
            box-shadow: 0 -5px 30px var(--shadow-color);
            animation: slideUp 0.8s ease;
            border: 1px solid var(--border-color);
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .footer-section h3 {
            color: var(--text-primary);
            font-size: 1.3em;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            position: relative;
        }

        .footer-section h3::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: 0;
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 10px;
            background: var(--hover-bg);
        }

        .contact-item:hover {
            transform: translateX(-5px);
            color: #667eea;
            background: linear-gradient(135deg, #667eea20, #764ba220);
        }

        .contact-icon {
            font-size: 1.3em;
            color: #667eea;
        }

        .contact-text {
            font-size: 1.1em;
        }

            display: block;
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 2px;
        }

            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .services-list {
            list-style: none;

        }

            margin-bottom: 12px;
            padding: 10px 15px;

            border-radius: 10px;
            color: var(--text-secondary);

        }

            color: #667eea;
        }

        .contact-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: center;
        }

        .contact-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .copyright-section {
            grid-column: 1 / -1;
            text-align: center;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .copyright-section p {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .copyright-icon {
            font-size: 1.2em;
            color: #667eea;
            animation: pulse 2s infinite;
        }

        .designer-name {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 1.2em;
            margin: 0 5px;
        }

        .no-copy-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #ff444420;
            padding: 5px 15px;
            border-radius: 20px;
            color: #ff4444;
            font-size: 0.9em;
            border: 1px solid #ff4444;
        }

        .custom-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 9999;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .custom-notification.success {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        .custom-notification.error {
            background: linear-gradient(135deg, #f44336, #d32f2f);
        }

        .custom-notification.info {
            background: linear-gradient(135deg, #2196F3, #1976D2);
        }

        .custom-notification.warning {
            background: linear-gradient(135deg, #ff9800, #f57c00);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0%); opacity: 1; }
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5em;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            z-index: 999;
            border: none;
            opacity: 0;
            visibility: hidden;
        }

        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }

        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            .stats-container { grid-template-columns: 1fr; }
            .modal-content { width: 95%; height: 90%; margin: 2% auto; }
            .header-content { flex-direction: column; text-align: center; }
            .logo-section { justify-content: center; }
            .salawat-section { width: 100%; justify-content: center; }
            .footer-content { grid-template-columns: 1fr; }
            .detail-row { flex-direction: column; align-items: flex-start; gap: 10px; }
            .detail-value { width: 100%; }
            .export-toolbar { justify-content: center; }
            .radio-group { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>

        // تهيئة
        updateStats();
